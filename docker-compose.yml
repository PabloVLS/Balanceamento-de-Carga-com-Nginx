version: '3.8'

networks:
  lb-network:
    driver: bridge

services:
  # Load Balancer (Nginx)
  lb:
    image: nginx:alpine
    container_name: load-balancer
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2
    networks:
      - lb-network

  # Servidor Web 1
  web1:
    image: nginx:alpine
    container_name: web1
    volumes:
      - ./web/index.html:/usr/share/nginx/html/index.html
    networks:
      - lb-network

  # Servidor Web 2
  web2:
    image: nginx:alpine
    container_name: web2
    volumes:
      - ./web/index.html:/usr/share/nginx/html/index.html
    networks:
      - lb-network