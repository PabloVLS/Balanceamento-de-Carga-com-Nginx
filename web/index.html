<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Load Balancer • Alta Disponibilidade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 60px 50px;
            width: 100%;
            max-width: 520px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 2.3em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.15em;
            margin-bottom: 40px;
        }

        .server {
            font-size: 5em;
            font-weight: 700;
            margin: 30px 0;
            padding: 20px 40px;
            border-radius: 16px;
        }

        .web1 { 
            color: #f87171; 
            background: rgba(248, 113, 113, 0.15);
        }
        
        .web2 { 
            color: #60a5fa; 
            background: rgba(96, 165, 250, 0.15);
        }

        .status {
            display: inline-block;
            padding: 12px 28px;
            background: #22c55e;
            color: #0f172a;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Load Balancer Nginx</h1>
        <p class="subtitle">Alta Disponibilidade • Round Robin</p>

        
        <div class="status">● Sistema Online</div>
    </div>
</body>
</html>
